{% extends 'app/base.html' %}

{% block content %}

<!-- 🔥 HERO SECTION -->
<div class="text-center mt-5">

    <h1 class="fw-bold display-4 mb-4 animate-text">
        Welcome to CS-IT Study Hub
    </h1>

    <p class="mb-4 text-light">
        Search books, topics & PDFs easily
    </p>

    <!-- 🔍 Search Bar -->
    <form method="GET" action="">
    <div class="d-flex justify-content-center">
        <input type="text" name="q"
               class="form-control w-50 p-3 rounded-pill shadow"
               placeholder="Search books, topics...">

        <button type="submit"
                class="btn btn-info ms-2 px-4 rounded-pill">
            Search
        </button>
    </div>
</form>


<!-- 📚 Featured Books -->
<div class="mt-5">
    <h3 class="text-center mb-4">Featured Books</h3>

    <div class="row">

        <div class="col-md-4">
            <div class="card bg-dark text-white shadow book-card">
                <div class="card-body text-center">
                    <h5>Python</h5>
                    <p>Programming Basics</p>
                    <button class="btn btn-info">View</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-dark text-white shadow book-card">
                <div class="card-body text-center">
                    <h5>DBMS</h5>
                    <p>Database System</p>
                    <button class="btn btn-info">View</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-dark text-white shadow book-card">
                <div class="card-body text-center">
                    <h5>Java</h5>
                    <p>OOP Concepts</p>
                    <button class="btn btn-info">View</button>
                </div>
            </div>
        </div>

    </div>
</div>

{% endblock %}
