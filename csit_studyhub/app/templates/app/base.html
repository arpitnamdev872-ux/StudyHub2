<!DOCTYPE html>
<html lang="en">
<head>

<body style="background: linear-gradient(135deg, #0f172a, #1e293b); color: white;">

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
